sast:
  runs-on: ubuntu-latest
  needs: build

  permissions:
    security-events: write
    actions: read
    contents: read

  steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Analyze
      uses: github/codeql-action/analyze@v3
